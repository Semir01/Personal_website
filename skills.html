<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>My Personal Website</title>
</head>

<body>
    <div class="container">
        <div id="menu"></div>
        <div class="page-title">
            <p>Skills</p>
        </div>
        <div class="background-linear">
            <div class="skill-image"></div>
        </div>
        <div class="skills">
            <div class="skill-section">
                <p class="skills-section-title">Web Development</p>
                <div class="skill-card">
                    <div class="skill-logo html"></div>
                    <div class="status-name">
                        <p class="skill-name">HTML</p>
                        <p class="skill-percentage html-percentage">70%</p>
                    </div>
                </div>
                <div class="skill-card">
                    <div class="skill-logo css"></div>
                    <div class="status-name">
                        <p class="skill-name">CSS</p>
                        <p class="skill-percentage css-percentage">50%</p>
                    </div>
                </div>
                <div class="skill-card">
                    <div class="skill-logo js"></div>
                    <div class="status-name">
                        <p class="skill-name">Java Script</p>
                        <p class="skill-percentage js-percentage">20%</p>
                    </div>
                </div>
            </div>
            <div class="skill-section">
                <p class="skills-section-title">Software Development</p>
                <div class="skill-card">
                    <div class="skill-logo c"></div>
                    <div class="status-name">
                        <p class="skill-name">C#</p>
                        <p class="skill-percentage c-percentage">40%</p>
                    </div>
                </div>
                <div class="skill-card">
                    <div class="skill-logo sql"></div>
                    <div class="status-name">
                        <p class="skill-name">SQL</p>
                        <p class="skill-percentage sql-percentage">60%</p>
                    </div>
                </div>
            </div>
            <div class="skill-section">
                <p class="skills-section-title">Embedded & Hardware</p>
                <div class="skill-card">
                    <div class="skill-logo electric"></div>
                    <div class="status-name">
                        <p class="skill-name">Electrical Work</p>
                        <p class="skill-percentage electric-percentage">70%</p>
                    </div>
                </div>
                <div class="skill-card">
                    <div class="skill-logo arduino"></div>
                    <div class="status-name">
                        <p class="skill-name">Arduino</p>
                        <p class="skill-percentage arduino-percentage">30%</p>
                    </div>
                </div>
                <div class="skill-card">
                    <div class="skill-logo profiCAD"></div>
                    <div class="status-name">
                        <p class="skill-name">ProfiCAD</p>
                        <p class="skill-percentage profiCAD-percentage">40%</p>
                    </div>
                </div>
            </div>
            <div class="skill-section">
                <p class="skills-section-title">Design & 3D</p>
                <div class="skill-card">
                    <div class="skill-logo figma"></div>
                    <div class="status-name">
                        <p class="skill-name">Figma</p>
                        <p class="skill-percentage figma-percentage">50%</p>
                    </div>
                </div>
                <div class="skill-card">
                    <div class="skill-logo blender"></div>
                    <div class="status-name">
                        <p class="skill-name">Blender</p>
                        <p class="skill-percentage blender-percentage">20%</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="script.js"></script>

</html>
